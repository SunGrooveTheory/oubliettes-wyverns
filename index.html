   <script type="module">

       function switchToLocalOnly() {
           isMultiplayer = false;
           const dot = document.getElementById('status-dot');
           const statusText = document.getElementById('status-text');
           
           const hubDot = document.getElementById('connection-status-dot');
           const hubStatusText = document.getElementById('connection-status-text');

           const applyStatus = (d, t, bg, textVal) => {
               if (d) { d.style.background = bg; d.style.animation = "pulse 2.0s infinite"; }
               if (t) { t.innerText = textVal; t.style.color = bg; }
           };

           applyStatus(dot, statusText, "#ffb703", "Sandbox Mode");
           applyStatus(hubDot, hubStatusText, "#ffb703", "Sandbox Mode (Offline)");
       }

       function listenToLobby(lobbyId) {
           if (unsubscribeSnapshot) unsubscribeSnapshot();
           roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', lobbyId);

           unsubscribeSnapshot = onSnapshot(roomRef, (snapshot) => {
               isMultiplayer = true; 
               
               const dot = document.getElementById('status-dot');
               const statusText = document.getElementById('status-text');
               
               const hubDot = document.getElementById('connection-status-dot');
               const hubStatusText = document.getElementById('connection-status-text');
               const codeBadge = document.getElementById('room-code-badge');
               const activeRoomCode = document.getElementById('active-room-code');
               const copyBtn = document.getElementById('btn-copy-link');
               const joinBtn = document.getElementById('btn-open-join-modal');
               
               const setConnected = (d, t) => {
                   if (d) { d.style.background = "var(--success-color)"; d.style.animation = "none"; }
                   if (t) { t.innerText = `Synchronized`; t.style.color = "var(--success-color)"; }
               };

               setConnected(dot, statusText);
               setConnected(hubDot, hubStatusText);

               if (codeBadge) {
                   codeBadge.innerText = `ROOM CODE: ${lobbyId}`;
               }
               if (activeRoomCode) {
                   activeRoomCode.innerText = lobbyId;
               }
               if (copyBtn) copyBtn.classList.remove('hidden');
               if (joinBtn) joinBtn.classList.remove('hidden');

               if (snapshot.exists()) {
                   const data = snapshot.data();
                   syncFromFirebaseData(data);
               } else {
                   setDoc(roomRef, localRoomState, { merge: true });
               }
           }, (err) => {
               console.error("Lobby snapshot failed:", err);
               switchToLocalOnly();
           });
       }

       async function init() {
           document.getElementById('btn-add-character').addEventListener('click', addPlayerSlot);
           document.getElementById('advance-to-rolling-btn').addEventListener('click', goToRollingScreen);
           document.getElementById('btn-finalize-stats').addEventListener('click', finalizeStatsAndStart);
           document.getElementById('btn-finalize').addEventListener('click', confirmFinalize);
           document.getElementById('btn-execute-finalize').addEventListener('click', executeFinalize);
           document.getElementById('active-player-select').addEventListener('change', updateHostDCReveal);

           // Connection controller buttons
           document.getElementById('btn-copy-link').addEventListener('click', copyLobbyLink);
           document.getElementById('btn-open-join-modal').addEventListener('click', openJoinModal);
           document.getElementById('btn-execute-join').addEventListener('click', executeJoinLobby);
           document.getElementById('btn-cancel-join').addEventListener('click', closeJoinModal);

           document.getElementById('btn-direct-join').addEventListener('click', () => {
               const codeInput = document.getElementById('input-direct-join-code');
               if (!codeInput) return;
               const rawCode = codeInput.value.trim().toUpperCase();
               if (rawCode.length < 3) {
                   showNotification("Please enter a valid lobby code.");
                   return;
               }
               window.location.hash = `room=${rawCode}`;
               window.location.reload();
           });

           document.getElementById('btn-copy-room').addEventListener('click', () => {
               const activeCode = document.getElementById('active-room-code').innerText;
               const tempInput = document.createElement("input");
               tempInput.style.position = "absolute";
               tempInput.style.left = "-9999px";
               tempInput.value = activeCode;
               document.body.appendChild(tempInput);
               tempInput.select();
               try {
                   document.execCommand("copy");
                   showNotification(`Room Code ${activeCode} copied! Send to your friends.`);
               } catch (err) {
                   console.error("Copy failed", err);
               }
               document.body.removeChild(tempInput);
           });

           setupGlobalDelegation();

           // 1. Authenticate with Firebase first
           const user = await performAuth();

           // 2. Authenticate with Discord SDK and extract display names if available
           if (discordSdk) {
               try {
                   await Promise.race([
                       discordSdk.ready(),
                       new Promise((_, reject) => setTimeout(() => reject(new Error("Timeout")), 2000))
                   ]);
                   try {
                       const authResult = await discordSdk.commands.authenticate();
                       if (authResult && authResult.user) {
                           myDiscordUsername = authResult.user.global_name || authResult.user.username;
                       }
                   } catch (authErr) {
                       console.warn("Discord SDK authentication failed.", authErr);
                   }
               } catch (discordErr) {
                   console.warn("Discord Handshake deferred. Continuing with browser params.");
               }
           }

           // 3. Resolve Lobby ID (Auto-placing users in the exact same channel/room instantly)
           const params = new URLSearchParams(window.location.search);
           const channelId = params.get('channel_id') || params.get('channelId');
           const instanceIdParam = params.get('instance_id') || params.get('instanceId');
           
           let resolvedLobbyId = "SANDBOX-LOBBY";
           const hashMatch = window.location.hash.match(/room=([A-Z0-9-]+)/i);
           if (hashMatch && hashMatch[1]) {
               resolvedLobbyId = hashMatch[1].toUpperCase();
           } else if (instanceIdParam || channelId) {
               resolvedLobbyId = (instanceIdParam || channelId).toUpperCase();
           } else {
               resolvedLobbyId = Math.random().toString(36).substring(2, 7).toUpperCase();
           }
           window.location.hash = `room=${resolvedLobbyId}`;

           // Instantly update UI Room Badge so they can always see the code
           const codeBadge = document.getElementById('room-code-badge');
           if (codeBadge) {
               codeBadge.innerText = `ROOM CODE: ${resolvedLobbyId}`;
           }
           
           const activeRoomCode = document.getElementById('active-room-code');
           if (activeRoomCode) {
               activeRoomCode.innerText = resolvedLobbyId;
           }

           // 4. Initialize Local State with verified, loaded Discord global name
           initializeLocalState();

           // 5. Connect to active multiplayer room
           if (user) {
               listenToLobby(resolvedLobbyId);
           } else {
               switchToLocalOnly();
           }
       }

       window.onload = function () {
           init();
       };
   </script>
